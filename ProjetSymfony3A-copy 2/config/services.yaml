# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    translate_provider: '%env(string:TRANSLATE_PROVIDER)%'
    deepl_api_url: '%env(DEEPL_API_URL)%'
    deepl_api_key: '%env(DEEPL_API_KEY)%'
    libretranslate_url: '%env(LIBRETRANSLATE_URL)%'
    libretranslate_api_key: '%env(LIBRETRANSLATE_API_KEY)%'


services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\TwilioService:
        arguments:
            $accountSid: '%env(TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(TWILIO_FROM_NUMBER)%'

    App\Service\ChatbotService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    App\Command\TestGroqApiCommand:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    App\Service\StripeService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Service\TranslationService:
        arguments:
            $provider: '%translate_provider%'
            $deeplUrl: '%deepl_api_url%'
            $deeplKey: '%deepl_api_key%'
            $libreUrl: '%libretranslate_url%'
            $libreKey: '%libretranslate_api_key%'

    App\Security\TwoFactor\TwilioSmsProvider:
        tags:
            - { name: 'scheb_two_factor.provider', alias: 'twilio_sms' }

    App\Security\TwoFactor\TwigFormRenderer: ~
